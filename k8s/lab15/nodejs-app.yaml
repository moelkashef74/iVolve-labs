apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: ivolve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      dockerimagePullSecrets:
        name: docker-cred
      containers:
      - name: nodejs-app
        image: mosayed711/nodejs-app:v2
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-env
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: app-env
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        volumeMounts:
        - name: app-logs
          mountPath: "/var/log/app"
    tolerations:
    - key: "node"
      operator: "Equal"
      value: "worker"
      effect: "NoSchedule"

    volumes:
    - name: app-logs
      persistentVolumeClaim:
        claimName: app-logs-pvc