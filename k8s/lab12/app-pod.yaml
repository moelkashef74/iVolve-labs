apiVersion: v1
kind: Pod
metadata: 
  name: app-pod
  labels: 
    app: nodejs

spec:
  containers:
  - name: nodejs
    image:  mosayed711/nodejs-app:v2
    ports:
    - containerPort: 3000
    envFrom:
    - configMapRef: 
        name: app-config
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef: 
          name: app-secret
          key: DB_PASSWORD
