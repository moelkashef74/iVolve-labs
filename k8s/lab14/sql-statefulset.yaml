apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql 
  namespace: ivolve
spec:
  serviceName: "mysql"
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:5.7
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MYSQL_ROOT_PASSWORD  
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-pvc
          mountPath: /var/lib/mysql
      tolerations:
      - key: "node"
        operator: "Equal"
        value: "worker"
  volumeClaimTemplates:
  - metadata:
      name: mysql-pvc
    spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
           requests:
               storage: 1Gi
